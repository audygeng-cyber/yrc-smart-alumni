name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Lint frontend
        run: npm run lint -w frontend

  # ยืนยันว่า Dockerfile (Cloud Run) ยัง build ได้ — ไม่ต้องมี Docker บนเครื่องพัฒนา
  docker-image:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t yrc-api:ci .
