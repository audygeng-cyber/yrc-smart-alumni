name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# ให้ action ที่ยังใช้สคริปต์บน Node 20 ย้ายไป Node 24 (ตามประกาศ GitHub Actions)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Lint
        run: npm run lint

      - name: Test backend
        run: npm run test -w backend

  # ยืนยันว่า Dockerfile (Cloud Run) ยัง build ได้ — ไม่ต้องมี Docker บนเครื่องพัฒนา
  docker-image:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t yrc-api:ci .

  # ทดสอบ /health + CORS ต่อ Cloud Run + Vercel — รันเมื่อตั้ง secrets VERIFY_API_BASE และ VERIFY_FRONTEND_ORIGIN ใน repo
  smoke-production:
    runs-on: ubuntu-latest
    needs: docker-image
    if: ${{ secrets.VERIFY_API_BASE != '' && secrets.VERIFY_FRONTEND_ORIGIN != '' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Smoke test (verify-deployment.mjs)
        env:
          VERIFY_API_BASE: ${{ secrets.VERIFY_API_BASE }}
          VERIFY_FRONTEND_ORIGIN: ${{ secrets.VERIFY_FRONTEND_ORIGIN }}
        run: node scripts/verify-deployment.mjs
