name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# ให้ action ที่ยังใช้สคริปต์บน Node 20 ย้ายไป Node 24 (ตามประกาศ GitHub Actions)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase migrations (Phase 1)
        run: npm run phase1:verify

      - name: Build frontend
        run: npm run build -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Verify Phase 2 API (Express core)
        run: npm run phase2:verify

      - name: Verify Phase 3 (members + LINE API probes)
        run: npm run phase3:verify

      - name: Verify Phase 4 (member portal API probes)
        run: npm run phase4:verify

      - name: Lint
        run: npm run lint

      - name: Test backend
        run: npm run test -w backend

  # ยืนยันว่า Dockerfile (Cloud Run) ยัง build ได้ — ไม่ต้องมี Docker บนเครื่องพัฒนา
  docker-image:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t yrc-api:ci .

  # ทดสอบ /health + CORS ต่อ Cloud Run + Vercel — ใช้ secrets VERIFY_* (ห้ามใช้ secrets ใน job-level if; เลยเช็กในสคริปต์)
  smoke-production:
    runs-on: ubuntu-latest
    needs: docker-image
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Smoke test (verify-deployment.mjs)
        env:
          VERIFY_API_BASE: ${{ secrets.VERIFY_API_BASE }}
          VERIFY_FRONTEND_ORIGIN: ${{ secrets.VERIFY_FRONTEND_ORIGIN }}
        run: |
          if [ -z "${VERIFY_API_BASE}" ] || [ -z "${VERIFY_FRONTEND_ORIGIN}" ]; then
            echo "Skip smoke-production: set repository secrets VERIFY_API_BASE and VERIFY_FRONTEND_ORIGIN."
            exit 0
          fi
          node scripts/verify-deployment.mjs
