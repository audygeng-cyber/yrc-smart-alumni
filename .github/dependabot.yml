# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    # ไม่เปิด PR อัปเดต major อัตโนมัติ (มักทำให้ build/lint พัง เช่น Tailwind 3→4)
    # ถ้าจะขึ้น major ค่อยทำเป็นงานแยกและทดสอบเอง
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
